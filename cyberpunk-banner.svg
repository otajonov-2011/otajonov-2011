<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;display=swap');

      .bg { fill: #0a0a0f; }
      .grid-h { stroke: #00f5ff; stroke-width: 0.3; opacity: 0.12; }
      .grid-v { stroke: #00f5ff; stroke-width: 0.3; opacity: 0.12; }

      .scan {
        fill: none;
        stroke: #00f5ff;
        stroke-width: 1.5;
        opacity: 0;
        animation: scanMove 4s linear infinite;
      }
      @keyframes scanMove {
        0%   { transform: translateY(-10px); opacity: 0; }
        10%  { opacity: 0.18; }
        90%  { opacity: 0.18; }
        100% { transform: translateY(290px); opacity: 0; }
      }

      .corner { stroke: #00f5ff; stroke-width: 2; fill: none; opacity: 0.9; }
      .corner-pink { stroke: #ff00ff; stroke-width: 2; fill: none; opacity: 0.9; }

      .top-bar { fill: #00f5ff; opacity: 0.08; }
      .bot-bar { fill: #ff00ff; opacity: 0.08; }

      .line-cyan { stroke: #00f5ff; stroke-width: 1.5; opacity: 0.7; }
      .line-pink { stroke: #ff00ff; stroke-width: 1.5; opacity: 0.7; }
      .line-thin { stroke: #00f5ff; stroke-width: 0.5; opacity: 0.3; }

      .name-text {
        font-family: 'Orbitron', 'Courier New', monospace;
        font-size: 48px;
        font-weight: 900;
        fill: #ffffff;
        filter: url(#glow-white);
        animation: namePulse 3s ease-in-out infinite;
      }
      @keyframes namePulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.88; }
      }

      .name-accent {
        font-family: 'Orbitron', 'Courier New', monospace;
        font-size: 48px;
        font-weight: 900;
        fill: #00f5ff;
        filter: url(#glow-cyan);
      }

      .role-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 16px;
        fill: #ff00ff;
        letter-spacing: 4px;
        animation: roleFlicker 5s step-end infinite;
      }
      @keyframes roleFlicker {
        0%,95%,100% { opacity: 1; }
        96% { opacity: 0; }
        97% { opacity: 1; }
        98% { opacity: 0; }
        99% { opacity: 1; }
      }

      .tag-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #00f5ff;
        letter-spacing: 2px;
        opacity: 0.7;
      }
      .tag-bg { fill: rgba(0,245,255,0.07); stroke: #00f5ff; stroke-width: 0.8; opacity: 0.8; }
      .tag-bg-pink { fill: rgba(255,0,255,0.07); stroke: #ff00ff; stroke-width: 0.8; opacity: 0.8; }
      .tag-text-pink {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #ff00ff;
        letter-spacing: 2px;
        opacity: 0.7;
      }

      .cursor-block {
        fill: #00f5ff;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      .dot-cyan { fill: #00f5ff; animation: dotPulse 2s ease-in-out infinite; }
      .dot-pink { fill: #ff00ff; animation: dotPulse 2s ease-in-out infinite 0.5s; }
      .dot-green { fill: #00ff88; animation: dotPulse 2s ease-in-out infinite 1s; }
      @keyframes dotPulse {
        0%,100% { r: 4; opacity: 1; }
        50% { r: 6; opacity: 0.6; }
      }

      .status-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 10px;
        fill: #00ff88;
        letter-spacing: 2px;
      }

      .deco-line {
        stroke-dasharray: 8 4;
        animation: dashMove 2s linear infinite;
      }
      @keyframes dashMove {
        to { stroke-dashoffset: -24; }
      }
    </style>

    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-white" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" class="bg" rx="12"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="40" x2="900" y2="40" class="grid-h"/>
  <line x1="0" y1="80" x2="900" y2="80" class="grid-h"/>
  <line x1="0" y1="120" x2="900" y2="120" class="grid-h"/>
  <line x1="0" y1="160" x2="900" y2="160" class="grid-h"/>
  <line x1="0" y1="200" x2="900" y2="200" class="grid-h"/>
  <line x1="0" y1="240" x2="900" y2="240" class="grid-h"/>

  <!-- Grid lines vertical -->
  <line x1="90" y1="0" x2="90" y2="280" class="grid-v"/>
  <line x1="180" y1="0" x2="180" y2="280" class="grid-v"/>
  <line x1="270" y1="0" x2="270" y2="280" class="grid-v"/>
  <line x1="360" y1="0" x2="360" y2="280" class="grid-v"/>
  <line x1="450" y1="0" x2="450" y2="280" class="grid-v"/>
  <line x1="540" y1="0" x2="540" y2="280" class="grid-v"/>
  <line x1="630" y1="0" x2="630" y2="280" class="grid-v"/>
  <line x1="720" y1="0" x2="720" y2="280" class="grid-v"/>
  <line x1="810" y1="0" x2="810" y2="280" class="grid-v"/>

  <!-- Scan line animation -->
  <line x1="0" y1="0" x2="900" y2="0" class="scan"/>

  <!-- Top bar accent -->
  <rect x="0" y="0" width="900" height="6" class="top-bar" rx="0"/>
  <rect x="0" y="0" width="900" height="2" fill="#00f5ff" opacity="0.9" rx="0"/>

  <!-- Bottom bar accent -->
  <rect x="0" y="274" width="900" height="6" class="bot-bar" rx="0"/>
  <rect x="0" y="278" width="900" height="2" fill="#ff00ff" opacity="0.9" rx="0"/>

  <!-- Corner decorations TL -->
  <polyline points="16,40 16,16 40,16" class="corner"/>
  <polyline points="20,40 20,20 40,20" class="corner" style="opacity:0.3"/>

  <!-- Corner decorations TR -->
  <polyline points="884,40 884,16 860,16" class="corner-pink"/>
  <polyline points="880,40 880,20 860,20" class="corner-pink" style="opacity:0.3"/>

  <!-- Corner decorations BL -->
  <polyline points="16,240 16,264 40,264" class="corner"/>
  <polyline points="20,240 20,260 40,260" class="corner" style="opacity:0.3"/>

  <!-- Corner decorations BR -->
  <polyline points="884,240 884,264 860,264" class="corner-pink"/>
  <polyline points="880,240 880,260 860,260" class="corner-pink" style="opacity:0.3"/>

  <!-- Left vertical accent line -->
  <line x1="52" y1="30" x2="52" y2="250" class="line-cyan"/>
  <line x1="56" y1="40" x2="56" y2="240" class="line-thin"/>

  <!-- Right vertical accent line -->
  <line x1="848" y1="30" x2="848" y2="250" class="line-pink"/>
  <line x1="844" y1="40" x2="844" y2="240" class="line-thin"/>

  <!-- Decorative dashed line top -->
  <line x1="70" y1="24" x2="830" y2="24" stroke="#00f5ff" stroke-width="0.8" opacity="0.3" class="deco-line"/>

  <!-- Decorative dashed line bottom -->
  <line x1="70" y1="256" x2="830" y2="256" stroke="#ff00ff" stroke-width="0.8" opacity="0.3" class="deco-line"/>

  <!-- Status dots top right -->
  <circle cx="800" cy="44" r="4" class="dot-green"/>
  <circle cx="818" cy="44" r="4" class="dot-cyan"/>
  <circle cx="836" cy="44" r="4" class="dot-pink"/>
  <text x="760" y="48" class="status-text">SYS.ONLINE</text>

  <!-- System label top left -->
  <text x="70" y="46" class="tag-text" style="font-size:10px; opacity:0.5;">// PROFILE.README.MD — v2.0</text>

  <!-- MAIN NAME -->
  <text x="450" y="130" text-anchor="middle" class="name-text">YOUR</text>
  <text x="450" y="182" text-anchor="middle" class="name-accent">NAME</text>

  <!-- Cursor after name -->
  <rect x="692" y="158" width="12" height="28" class="cursor-block"/>

  <!-- Role subtitle -->
  <text x="450" y="215" text-anchor="middle" class="role-text">&gt; FULL STACK DEVELOPER_</text>

  <!-- Tags row -->
  <rect x="130" y="232" width="90" height="22" rx="3" class="tag-bg"/>
  <text x="175" y="247" text-anchor="middle" class="tag-text">FRONTEND</text>

  <rect x="232" y="232" width="90" height="22" rx="3" class="tag-bg"/>
  <text x="277" y="247" text-anchor="middle" class="tag-text">BACKEND</text>

  <rect x="334" y="232" width="90" height="22" rx="3" class="tag-bg-pink"/>
  <text x="379" y="247" text-anchor="middle" class="tag-text-pink">DEVOPS</text>

  <rect x="436" y="232" width="90" height="22" rx="3" class="tag-bg"/>
  <text x="481" y="247" text-anchor="middle" class="tag-text">DATABASE</text>

  <rect x="538" y="232" width="90" height="22" rx="3" class="tag-bg-pink"/>
  <text x="583" y="247" text-anchor="middle" class="tag-text-pink">API DESIGN</text>

  <rect x="640" y="232" width="90" height="22" rx="3" class="tag-bg"/>
  <text x="685" y="247" text-anchor="middle" class="tag-text">CLOUD ☁</text>

  <!-- Horizontal accent lines beside name -->
  <line x1="70" y1="140" x2="200" y2="140" class="line-cyan" style="opacity:0.4"/>
  <line x1="70" y1="148" x2="160" y2="148" class="line-thin"/>
  <line x1="700" y1="140" x2="830" y2="140" class="line-pink" style="opacity:0.4"/>
  <line x1="740" y1="148" x2="830" y2="148" class="line-thin"/>

  <!-- Circuit dots decoration left -->
  <circle cx="80" cy="140" r="3" fill="#00f5ff" opacity="0.8"/>
  <circle cx="100" cy="140" r="2" fill="#00f5ff" opacity="0.5"/>
  <circle cx="116" cy="140" r="1.5" fill="#00f5ff" opacity="0.3"/>

  <!-- Circuit dots decoration right -->
  <circle cx="820" cy="140" r="3" fill="#ff00ff" opacity="0.8"/>
  <circle cx="800" cy="140" r="2" fill="#ff00ff" opacity="0.5"/>
  <circle cx="784" cy="140" r="1.5" fill="#ff00ff" opacity="0.3"/>

  <!-- Uzbekistan badge -->
  <rect x="370" y="86" width="160" height="22" rx="11" fill="rgba(0,255,136,0.08)" stroke="#00ff88" stroke-width="0.8" opacity="0.8"/>
  <text x="450" y="101" text-anchor="middle" font-family="'Share Tech Mono',monospace" font-size="11" fill="#00ff88" letter-spacing="2" opacity="0.9">📍 UZBEKISTAN — UTC+5</text>

</svg>
